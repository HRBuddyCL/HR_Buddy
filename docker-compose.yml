services:
  postgres:
    image: postgres:16
    container_name: hr_buddy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Bangkok
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - hr_buddy_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: hr_buddy_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      TZ: Asia/Bangkok
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres

volumes:
  hr_buddy_pgdata: