name: Backend Release Gate

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-release-gate.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-release-gate.yml'
  workflow_dispatch:

concurrency:
  group: backend-release-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://hrbuddy:hrbuddy_pass@localhost:5432/hr_buddy?schema=public
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hrbuddy
          POSTGRES_PASSWORD: hrbuddy_pass
          POSTGRES_DB: hr_buddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hrbuddy -d hr_buddy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend release gate
        run: npm run release:gate
