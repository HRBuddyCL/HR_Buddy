name: Backend Preprod Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL of backend target (for example https://api-preprod.example.com)
        required: true
        type: string
      admin_username:
        description: Admin username for smoke login
        required: false
        default: admin
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke Preprod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      SMOKE_BASE_URL: ${{ inputs.base_url }}
      SMOKE_ADMIN_USERNAME: ${{ inputs.admin_username }}
      SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure required secret is present
        run: |
          if [ -z "$SMOKE_ADMIN_PASSWORD" ]; then
            echo "SMOKE_ADMIN_PASSWORD secret is required"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run preprod smoke checks
        run: npm run smoke:preprod
